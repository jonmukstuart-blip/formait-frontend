<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forma.IT - Admin Login Gateway</title>
    <style>
        /* Elite Minimalist Offline UI Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #080808;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-h: 100vh;
            height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background-color: #0f0f0f;
            border: 1px solid #27272a;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0.05em;
        }
        .accent-dot {
            color: #3b82f6;
        }
        .header p {
            color: #71717a;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 600;
            margin-top: 0.35rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #71717a;
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            background-color: #080808;
            border: 1px solid #27272a;
            border-radius: 0.75rem;
            padding: 0.85rem 1rem;
            font-size: 0.875rem;
            color: #ffffff;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #3b82f6;
        }
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background-color: #3b82f6;
            border: none;
            border-radius: 0.75rem;
            color: #000000;
            font-weight: 900;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }
        .submit-btn:hover {
            background-color: #2563eb;
        }
        .error-text {
            color: #f87171;
            font-size: 0.75rem;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
        }

        .login-logo-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 45px;
    margin-bottom: 0.75rem;
    overflow: hidden;
}

.login-logo {
    height: 42px;
    width: auto;
    max-width: 160px;
    object-fit: contain;
    display: block;
}
    </style>
</head>
<body>

    <div class="login-card">
       <div class="header">

    <div class="login-logo-wrapper">
        <img 
            src="./frontend/assets/image/logo.png" 
            alt="forma.IT Group"
            class="login-logo"
            onerror="this.src='./frontend/assets/image/logo.svg'; this.onerror=function(){this.src='./frontend/assets/image/logo.jpg'};"
        >
    </div>

    <p>Master Access Gateway</p>

</div>

        <div id="errorMsg" class="error-text"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Admin Email</label>
                <input id="email" type="email" required placeholder="admin@formaitgroup.com">
            </div>

<div class="form-group password-wrapper">
    <label>Secure Password</label>

    <div style="position:relative;">
        <input 
            id="password" 
            type="password" 
            required 
            placeholder="••••••••"
        >

        <button 
            type="button"
            id="togglePassword"
            style="
                position:absolute;
                right:12px;
                top:50%;
                transform:translateY(-50%);
                background:none;
                border:none;
                cursor:pointer;
                color:#71717a;
            "
            aria-label="Show password"
        >
            👁
        </button>
    </div>
</div>

            <button type="submit" class="submit-btn">
                Authenticate Secure Access
            </button>
        </form>
    </div>

    <script src="./frontend/api.js"></script>

        <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg");

            // ==========================================================================
            // 🔒 INSTANT SANDBOX BYPASS VECTOR (ELIMINATES THE 2-SECOND DELAY)
            // ==========================================================================

            try {
                // Production network pathway used strictly when running live servers
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem("token", data.token);
                    window.location.href = "admin.html";
                } else {
                    errorMsg.innerText = data.message || "Invalid administrative credentials.";
                    errorMsg.style.display = "block";
                }
           } catch (err) {
    console.error("FULL LOGIN ERROR:", err);
    console.error("API_BASE:", window.API_BASE);

    errorMsg.innerText = err.message;
    errorMsg.style.display = "block";
}
        });
    </script>

<script>
const passwordInput = document.getElementById("password");
const togglePassword = document.getElementById("togglePassword");

if (passwordInput && togglePassword) {

    togglePassword.addEventListener("click", () => {

        const isHidden = passwordInput.type === "password";

        passwordInput.type = isHidden ? "text" : "password";

        togglePassword.textContent = isHidden ? "🙈" : "👁";

    });

}
</script>

</body>
</html>
