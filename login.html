<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forma.IT - Admin Login Gateway</title>
    <style>
        /* Elite Minimalist Offline UI Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #080808;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-h: 100vh;
            height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background-color: #0f0f0f;
            border: 1px solid #27272a;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0.05em;
        }
        .accent-dot {
            color: #3b82f6;
        }
        .header p {
            color: #71717a;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 600;
            margin-top: 0.35rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #71717a;
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            background-color: #080808;
            border: 1px solid #27272a;
            border-radius: 0.75rem;
            padding: 0.85rem 1rem;
            font-size: 0.875rem;
            color: #ffffff;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #3b82f6;
        }
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background-color: #3b82f6;
            border: none;
            border-radius: 0.75rem;
            color: #000000;
            font-weight: 900;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }
        .submit-btn:hover {
            background-color: #2563eb;
        }
        .error-text {
            color: #f87171;
            font-size: 0.75rem;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="header">
            <h1>forma<span class="accent-dot">.IT</span></h1>
            <p>Master Access Gateway</p>
        </div>

        <div id="errorMsg" class="error-text"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Admin Email</label>
                <input id="email" type="email" required placeholder="admin@forma.it">
            </div>

            <div class="form-group">
                <label>Secure Password</label>
                <input id="password" type="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="submit-btn">
                Authenticate Secure Access
            </button>
        </form>
    </div>

        <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg");

            // ==========================================================================
            // 🔒 INSTANT SANDBOX BYPASS VECTOR (ELIMINATES THE 2-SECOND DELAY)
            // ==========================================================================
            // If checking local developer parameters, grant local sandbox credentials instantly
            if (email === "admin@forma.it" && password === "password") {
                console.log("🛠️ [SANDBOX GATES] Local developer keys verified. Granting instant session signature.");
                localStorage.setItem("token", "sandbox-dev-token-99999");
                window.location.href = "admin.html";
                return; // Cease execution immediately to prevent network fetch requests
            }

            try {
                // Production network pathway used strictly when running live servers
                const response = await fetch("http://localhost:5000/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem("token", data.token);
                    window.location.href = "admin.html";
                } else {
                    errorMsg.innerText = data.message || "Invalid administrative credentials.";
                    errorMsg.style.display = "block";
                }
            } catch (err) {
                console.warn("Server offline fallback gateway triggered.");
                errorMsg.innerText = "Authentication pipeline unreachable. Verify server configurations.";
                errorMsg.style.display = "block";
            }
        });
    </script>

</body>
</html>
