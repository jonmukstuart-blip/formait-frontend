<!DOCTYPE html>

<html lang="en" class="bg-[#0A0A0A]">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Client Login | forma.IT GROUP</title>

<script src="./js/api.js"></script>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>

body {
    font-family: Inter, sans-serif;
}

.glow {
    background:
    radial-gradient(circle at top,
    rgba(59,130,246,.25),
    transparent 50%);
}

</style>

</head>

<body class="min-h-screen bg-[#0A0A0A] text-white flex items-center justify-center overflow-hidden">

<!-- BACKGROUND EFFECT -->

<div class="fixed inset-0 glow pointer-events-none"></div>

<!-- LOGIN CARD -->

<div class="relative w-full max-w-md mx-5">

<div class="bg-zinc-950/80 backdrop-blur-xl border border-zinc-800 rounded-3xl p-8">

<h1 class="text-4xl font-black text-center mb-2">
forma<span class="text-blue-500">.IT</span>
</h1>

<p class="text-center text-zinc-500 mb-8">
Client Portal
</p>


<input
id="clientEmail"
type="email"
placeholder="Email"
class="w-full mb-4 p-4 bg-black border border-zinc-800 rounded-xl">


<div class="relative mb-4">

<input
id="clientPassword"
type="password"
placeholder="Password"
class="w-full p-4 bg-black border border-zinc-800 rounded-xl">


<button
type="button"
onclick="togglePassword('clientPassword')"
class="absolute right-4 top-4">

👁

</button>

</div>


<button
onclick="loginClient()"
class="w-full bg-blue-500 text-black font-black py-4 rounded-xl">

LOGIN

</button>


<a href="forgot-password.html"
class="block text-center text-blue-400 mt-5 text-sm">

Forgot password?

</a>


<!-- REGISTER -->

<p class="text-center text-sm text-zinc-500 mt-6">

New client?

<a href="client-register.html"
class="text-blue-400 hover:underline">

Create account

</a>

</p>


<!-- BACK -->

<a href="index.html"
class="block text-center text-xs text-zinc-600 mt-6 hover:text-white">

← Back to website

</a>


</div>

</div>


<script src="./js/client-auth.js"></script>
</body>

</html>
