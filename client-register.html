<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Client Register | forma.IT</title>

<script src="./js/api.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-[#0A0A0A] text-white min-h-screen flex items-center justify-center">


<div class="w-full max-w-md bg-zinc-950 border border-zinc-800 rounded-3xl p-8">


<h1 class="text-3xl font-black text-center mb-2">
forma<span class="text-blue-500">.IT</span>
</h1>

<p class="text-center text-zinc-500 mb-8">
Client Registration
</p>



<input
id="clientName"
placeholder="Full Name"
class="w-full mb-4 p-4 bg-black border border-zinc-800 rounded-xl">



<input
id="clientEmail"
type="email"
placeholder="Email"
class="w-full mb-4 p-4 bg-black border border-zinc-800 rounded-xl">



<!-- PASSWORD -->

<div class="relative mb-4">

<input
id="clientPassword"
type="password"
placeholder="Password"
class="w-full p-4 bg-black border border-zinc-800 rounded-xl">


<button
type="button"
onclick="togglePassword('clientPassword')"
class="absolute right-4 top-4 text-zinc-400">

👁

</button>

</div>



<!-- CONFIRM PASSWORD -->

<div class="relative mb-6">

<input
id="clientConfirmPassword"
type="password"
placeholder="Confirm Password"
class="w-full p-4 bg-black border border-zinc-800 rounded-xl">


<button
type="button"
onclick="togglePassword('clientConfirmPassword')"
class="absolute right-4 top-4 text-zinc-400">

👁

</button>

</div>




<button
onclick="registerClient()"
class="w-full bg-blue-500 text-black font-bold py-4 rounded-xl hover:scale-[1.02] transition">

CREATE ACCOUNT

</button>



<p class="text-center text-zinc-500 mt-6 text-sm">

Already have an account?

<a href="client-login.html"
class="text-blue-400 hover:underline">

Login

</a>

</p>



<a href="index.html"
class="block text-center text-xs text-zinc-600 mt-6 hover:text-white">

← Back to website

</a>



</div>



<script src="./js/client-auth.js"></script>


</body>

</html>
