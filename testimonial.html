<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>forma.IT | Client Testimonial</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Input state transitions */
    input, textarea {
      transition: all 0.2s ease;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
      transform: translateY(-1px);
    }
    input:hover, textarea:hover {
      border-color: rgba(59,130,246,0.25);
    }

    /* Interactive star micro-interactions */
    #ratingStars span {
      transition: all 0.2s ease;
    }
    #ratingStars span:hover {
      transform: scale(1.2);
      color: #eab308; /* Tailwind yellow-500 */
    }

    /* Ambient float animations */
    @keyframes floatSoft {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }
    .animate-float {
      animation: floatSoft 6s ease-in-out infinite;
    }

    /* Elegant glassmorphic card scaling */
    .card-hover {
      transition: all 0.25s ease;
    }
    .card-hover:hover {
      transform: translateY(-3px);
      border-color: rgba(59,130,246,0.4);
      box-shadow: 0 10px 30px rgba(59,130,246,0.08);
    }

    /* Initial layout splash transition */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeUp 0.6s ease forwards;
    }

    /* HARDENED: Smooth layout transitions without structural layout snapping */
    .step {
      opacity: 0;
      visibility: hidden;
      position: absolute;
      width: 100%;
      top: 0;
      left: 0;
      transform: translateY(12px);
      transition: opacity 0.35s ease, transform 0.35s ease, visibility 0.35s;
      will-change: transform, opacity;
    }
    .step.active {
      opacity: 1;
      visibility: visible;
      position: relative;
      transform: translateY(0);
    }
    .wizard-container {
      position: relative;
      overflow: hidden;
    }
  </style>
</head>

<body class="bg-gradient-to-b from-black via-zinc-950 to-black text-white min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-3xl bg-zinc-950 border border-zinc-800 rounded-3xl p-10 animate-float fade-in card-hover">
    
    <!-- HEADER BAR -->
    <div class="mb-6 border-b border-zinc-800 pb-6 text-center">
      <div class="flex justify-center mb-4">
        <img 
          src="./assets/image/logo.png" 
          alt="forma.IT Group" 
          class="h-12 w-auto object-contain max-w-[200px]"
          onerror="this.src='./frontend/assets/image/logo.svg'; this.onerror=function(){this.src='./frontend/assets/image/logo.jpg'};"
        >
      </div>
      <p class="text-zinc-400 mb-2">
        Thank you for choosing <span class="text-white font-semibold">FORMA.IT</span>
      </p>
      <p class="text-zinc-500 text-sm">
        Sharing your experience about
        <!-- FIXED: Syncing reference container for url projection titles -->
        <span id="projectName" class="text-blue-400 font-medium">this project</span>
      </p>
    </div>

    <!-- WIZARD STEP TRACKER -->
    <div class="mb-8">
      <div class="flex justify-between text-xs text-zinc-500 mb-2 px-1">
        <span>Identity</span>
        <span>Rating</span>
        <span>Experience</span>
        <span>Finish</span>
      </div>
      <div class="w-full h-1 bg-zinc-800 rounded-full overflow-hidden">
        <div id="progressBar" class="h-full bg-blue-600 w-1/4 transition-all duration-300"></div>
      </div>
    </div>

    <!-- FORM INITIALIZATION -->
    <form id="testimonialForm" class="wizard-container" enctype="multipart/form-data">

      <!-- STEP 1: PROJECT + CLIENT INFO -->
      <div class="step active">
        <div class="mb-6">
          <label class="block text-sm text-zinc-500 mb-2">Project</label>
          <input
            type="text"
            id="projectTitle"
            readonly
            class="w-full rounded-xl bg-zinc-900 border border-zinc-800 p-4 text-zinc-400 focus:border-zinc-800 cursor-not-allowed select-none">
        </div>

        <div class="grid md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm text-zinc-500 mb-2">Your Name *</label>
            <input
              type="text"
              id="clientName"
              required
              placeholder="e.g. Jane Doe"
              class="w-full rounded-xl bg-zinc-900 border border-zinc-800 p-4 text-white">
          </div>
          <div>
            <label class="block text-sm text-zinc-500 mb-2">Company</label>
            <input
              type="text"
              id="company"
              placeholder="e.g. Acme Corp"
              class="w-full rounded-xl bg-zinc-900 border border-zinc-800 p-4 text-white">
          </div>
        </div>

        <div class="mt-6">
          <label class="block text-sm text-zinc-500 mb-2">Position</label>
          <input
            type="text"
            id="position"
            placeholder="e.g. CEO / Managing Director"
            class="w-full rounded-xl bg-zinc-900 border border-zinc-800 p-4 text-white">
        </div>

        <button type="button" onclick="nextStep()" class="mt-6 w-full bg-blue-600 hover:bg-blue-700 transition-colors py-4 rounded-xl font-bold tracking-wide">
          Continue
        </button>
      </div>

      <!-- STEP 2: RATING -->
      <div class="step">
        <label class="block text-sm text-zinc-500 mb-3">Overall Rating *</label>
        <div id="ratingStars" class="flex gap-3 text-4xl cursor-pointer select-none text-yellow-500 py-2">
          <span data-rating="1">☆</span>
          <span data-rating="2">☆</span>
          <span data-rating="3">☆</span>
          <span data-rating="4">☆</span>
          <span data-rating="5">☆</span>
        </div>

        <div class="flex gap-3 mt-6">
          <button type="button" onclick="prevStep()" class="w-1/2 bg-zinc-800 hover:bg-zinc-700 transition-colors py-4 rounded-xl font-medium">
            Back
          </button>
          <button type="button" onclick="nextStep()" class="w-1/2 bg-blue-600 hover:bg-blue-700 transition-colors py-4 rounded-xl font-medium">
            Continue
          </button>
        </div>
      </div>

      <!-- STEP 3: TESTIMONIAL -->
      <div class="step">
        <label class="block text-sm text-zinc-500 mb-2">Your Experience *</label>
        <textarea
          id="testimonial"
          rows="6"
          required
          class="w-full rounded-xl bg-zinc-900 border border-zinc-800 p-4 text-white resize-none"
          placeholder="Tell future clients about your experience working with us..."></textarea>

        <div class="flex gap-3 mt-6">
          <button type="button" onclick="prevStep()" class="w-1/2 bg-zinc-800 hover:bg-zinc-700 transition-colors py-4 rounded-xl font-medium">
            Back
          </button>
          <button type="button" onclick="nextStep()" class="w-1/2 bg-blue-600 hover:bg-blue-700 transition-colors py-4 rounded-xl font-medium">
            Continue
          </button>
        </div>
      </div>

      <!-- STEP 4: UPLOAD + SUBMIT -->
      <div class="step">
        <label class="block text-sm text-zinc-500 mb-2">
          Upload Project Media / Video Showcase <span class="text-zinc-600">(Optional)</span>
        </label>
        <input
          type="file"
          id="media"
          name="media"
          accept="image/*,video/*"
          class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-xl text-zinc-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-zinc-800 file:text-white hover:file:bg-zinc-700 file:cursor-pointer">

        <div class="flex gap-3 mt-6">
          <button type="button" onclick="prevStep()" class="w-1/2 bg-zinc-800 hover:bg-zinc-700 transition-colors py-4 rounded-xl font-medium">
            Back
          </button>
          <button type="submit" class="w-1/2 bg-green-600 hover:bg-green-700 transition-colors py-4 rounded-xl font-bold tracking-wide">
            Submit Review
          </button>
        </div>
      </div>

    </form>

  </div>

  <!-- LOADING BACKDROP SCREEN OVERLAY -->
  <div id="stepLoader" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 transition-all">
    <div class="text-center">
      <div class="w-12 h-12 border-4 border-zinc-800 border-t-blue-500 rounded-full animate-spin mx-auto"></div>
      <p class="text-zinc-400 mt-4 text-sm font-medium tracking-wide">Processing step changes...</p>
    </div>
  </div>

  <!-- LINKING FRONTEND SCRIPT LAYER -->
  <script src="./js/testimonials.js"></script>
</body>
</html>
